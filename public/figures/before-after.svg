<svg width="980" height="520" viewBox="0 0 980 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="980" height="520" rx="24" fill="#0c0d12"/>
  <text x="44" y="58" fill="#f8fafc" font-family="Arial, sans-serif" font-size="25" font-weight="700">Before / After: Unsupported Claims Accepted</text>
  <text x="44" y="86" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14">Offline graph-gate run on 1,036 claim/evidence pairs. Lower is better.</text>

  <g font-family="Arial, sans-serif">
    <line x1="142" y1="410" x2="880" y2="410" stroke="#334155" stroke-width="2"/>
    <line x1="142" y1="126" x2="142" y2="410" stroke="#334155" stroke-width="2"/>

    <text x="126" y="414" fill="#94a3b8" font-size="11" text-anchor="end">0</text>
    <text x="126" y="307" fill="#94a3b8" font-size="11" text-anchor="end">200</text>
    <text x="126" y="200" fill="#94a3b8" font-size="11" text-anchor="end">400</text>
    <text x="126" y="132" fill="#94a3b8" font-size="11" text-anchor="end">529</text>

    <rect x="252" y="126" width="170" height="284" rx="10" fill="#ef4444"/>
    <text x="337" y="112" fill="#fecaca" font-size="18" font-weight="700" text-anchor="middle">529</text>
    <text x="337" y="448" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">Vanilla LLaMA</text>
    <text x="337" y="470" fill="#94a3b8" font-size="12" text-anchor="middle">pass-through baseline</text>

    <rect x="570" y="400" width="170" height="10" rx="5" fill="#22c55e"/>
    <text x="655" y="387" fill="#bbf7d0" font-size="18" font-weight="700" text-anchor="middle">19</text>
    <text x="655" y="448" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">TruthLayer graph gate</text>
    <text x="655" y="470" fill="#94a3b8" font-size="12" text-anchor="middle">adapter/wrapper path</text>

    <rect x="552" y="126" width="206" height="58" rx="14" fill="#111827" stroke="#22c55e"/>
    <text x="655" y="151" fill="#f8fafc" font-size="15" font-weight="700" text-anchor="middle">96.4% fewer false accepts</text>
    <text x="655" y="172" fill="#94a3b8" font-size="12" text-anchor="middle">529 -> 19 accepted unsupported claims</text>

    <rect x="158" y="126" width="68" height="284" rx="8" fill="#1e293b"/>
